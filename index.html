<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <title>Random Quote | devChallenges.io</title>
  </head>
  <body>
    <div class="box">
      <h3 id="author">George Bernard Shaw</h3>
      <div class="types">
        <h5>Famous Quotes</h5>
        <h5>Inspirational</h5>
      </div>
      <div class="quote">
        <h1 id="quote">Learn from yesterday, live for today, hope for tomorrow.</h1>
      </div>
    </div>
    <div class="interact">
      <button id="random" class="tag">
        Random
        <img src="resources\regroup.svg">
      </button>
      <button id="share" class="tag">
        Share
        <img src="resources\link.svg">
      </button>
    </div>
  </body>
  <script src="script.js">
  </script>
</html>
